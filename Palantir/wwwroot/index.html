<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Палантир — конфликты</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <main class="container py-4">
        <header class="mb-4">
            <h1>Палантир</h1>
            <p class="text-muted">Веб-приложение визуализации данных о боевых действиях</p>
        </header>

        <section>
            <h2 class="mb-3">Военные конфликты</h2>

            <div id="loadingMessage" class="alert alert-info">
                Загрузка конфликтов...
            </div>

            <div id="errorMessage" class="alert alert-danger d-none">
                Не удалось загрузить список конфликтов.
            </div>

            <div id="conflictsList" class="row g-3"></div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/conflicts-page.js"></script>
</body>
</html>
