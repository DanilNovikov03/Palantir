<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Палантир — операция</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <main class="container py-4">
        <a id="backToTheaterButton" href="/index.html" class="btn btn-outline-secondary mb-4">
            ← Назад к театру
        </a>

        <div id="loadingMessage" class="alert alert-info">
            Загрузка данных операции...
        </div>

        <div id="errorMessage" class="alert alert-danger d-none">
            Не удалось загрузить данные операции.
        </div>

        <section id="operationDetails" class="d-none">
            <div class="row g-4">
                <div class="col-lg-8">
                    <h1 id="operationTitle"></h1>

                    <p id="operationDates" class="text-muted"></p>

                    <p id="operationDescription" class="lead"></p>

                    <div id="operationGoalBlock" class="card mb-3 d-none">
                        <div class="card-body">
                            <h5 class="card-title">Цель операции</h5>
                            <p id="operationGoal" class="card-text"></p>
                        </div>
                    </div>

                    <div id="operationResultBlock" class="card mb-4 d-none">
                        <div class="card-body">
                            <h5 class="card-title">Итог операции</h5>
                            <p id="operationResult" class="card-text"></p>
                        </div>
                    </div>

                    <section id="eventsSection">
                        <h2 class="mb-3">Хронология событий</h2>

                        <div id="eventsList"></div>
                    </section>
                </div>

                <aside class="col-lg-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Карта операции</h5>

                            <p class="card-text text-muted">
                                Здесь позже будет переход к карте с отображением событий, линии фронта и других объектов.
                            </p>

                            <a id="mapButton" href="/map.html" class="btn btn-primary w-100">
                                Перейти к карте
                            </a>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/operation-page.js"></script>
</body>
</html>
