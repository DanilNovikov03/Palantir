<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Палантир — операция</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <main class="container py-4">
        <a id="backToTheaterButton" href="/index.html" class="btn btn-outline-secondary mb-4">
            ← Назад к театру
        </a>

        <div id="loadingMessage" class="alert alert-info">
            Загрузка данных операции...
        </div>

        <div id="errorMessage" class="alert alert-danger d-none">
            Не удалось загрузить данные операции.
        </div>

        <section id="operationDetails" class="d-none">
            <div class="row g-4">
                <div class="col-lg-8">
                    <h1 id="operationTitle"></h1>

                    <p id="operationDates" class="text-muted"></p>

                    <p id="operationDescription" class="lead"></p>

                    <section class="mb-4" aria-labelledby="operationSidesTitle">
                        <div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
                            <h2 id="operationSidesTitle" class="h5 mb-0">Участники операции</h2>
                            <button id="addOperationSideButton" class="btn btn-sm btn-outline-primary" type="button">Добавить сторону операции</button>
                        </div>
                        <div id="operationSidesList" class="d-flex flex-wrap gap-2" aria-live="polite">
                            <span class="text-muted">Загрузка сторон...</span>
                        </div>
                        <form id="operationSideForm" class="border rounded p-3 mt-3 d-none">
                            <label for="operationSideSelect" class="form-label">Сторона конфликта</label>
                            <select id="operationSideSelect" class="form-select mb-3" required></select>
                            <div class="d-flex gap-2">
                                <button class="btn btn-primary" type="submit">Сохранить</button>
                                <button id="cancelOperationSideForm" class="btn btn-outline-secondary" type="button">Отмена</button>
                            </div>
                        </form>
                        <div id="operationSidesStatus" class="alert d-none mt-3 mb-0" role="status"></div>
                    </section>

                    <div id="operationGoalBlock" class="card mb-3 d-none">
                        <div class="card-body">
                            <h5 class="card-title">Цель операции</h5>
                            <p id="operationGoal" class="card-text"></p>
                        </div>
                    </div>

                    <div id="operationResultBlock" class="card mb-4 d-none">
                        <div class="card-body">
                            <h5 class="card-title">Итог операции</h5>
                            <p id="operationResult" class="card-text"></p>
                        </div>
                    </div>

                    <section id="eventsSection">
                        <h2 class="mb-3">Хронология событий</h2>

                        <div id="eventsList"></div>
                    </section>
                </div>

                <aside class="col-lg-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Карта операции</h5>

                            <p class="card-text text-muted">События создаются и размещаются только на карте операции.</p>

                            <a id="mapButton" href="/map.html" class="btn btn-primary w-100">
                                Добавить событие на карте
                            </a>
                        </div>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/operation-page.js"></script>
</body>
</html>
