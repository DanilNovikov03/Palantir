<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Палантир — конфликт</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/site.css" rel="stylesheet">
</head>
<body>
    <main class="container py-4">
        <a href="/index.html" class="btn btn-outline-secondary mb-4">
            ← Назад к конфликтам
        </a>

        <div id="loadingMessage" class="alert alert-info">
            Загрузка данных конфликта...
        </div>

        <div id="errorMessage" class="alert alert-danger d-none">
            Не удалось загрузить данные конфликта.
        </div>

        <section id="conflictDetails" class="d-none mb-5">
            <h1 id="conflictName"></h1>

            <p id="conflictDates" class="text-muted"></p>

            <p id="conflictNote"></p>
        </section>

        <section id="theatersSection" class="d-none">
            <h2 class="mb-3">Театры военных действий</h2>

            <div id="theatersList" class="row g-3"></div>
        </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/conflict-page.js"></script>
</body>
</html>
